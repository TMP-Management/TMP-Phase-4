<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMP Phase 4 | Written Assessment</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; display: flex; justify-content: center; align-items: center; padding: 24px; }
  body::before { content: ''; position: fixed; inset: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 20% 50%, rgba(255,105,180,0.12) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(0,220,255,0.12) 0%, transparent 50%), radial-gradient(ellipse at 60% 80%, rgba(120,0,255,0.07) 0%, transparent 50%); animation: bgShift 12s ease-in-out infinite alternate; z-index: 0; pointer-events: none; }
  @keyframes bgShift { 0% { transform: translate(0%,0%) rotate(0deg); } 100% { transform: translate(2%,5%) rotate(4deg); } }
  .content-wrapper { width: 100%; display: flex; justify-content: center; align-items: center; transition: filter 0.3s ease, transform 0.3s ease; z-index: 1; }
  .blur-shield { filter: blur(45px) grayscale(100%); transform: scale(0.92); pointer-events: none; }
  .blur-overlay { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.85); backdrop-filter: blur(25px); justify-content: center; align-items: center; text-align: center; border: 2px solid rgba(255,105,180,0.4); }
  .blur-overlay.active { display: flex; }
  .security-notice { font-family: 'Rajdhani', sans-serif; }
  .security-notice h1 { color: #ff3a3a; font-size: 28px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255,58,58,0.5); }
  .security-notice p { color: #00dcff; font-size: 14px; letter-spacing: 1px; }
  #app { position: relative; width: 100%; max-width: 480px; height: auto; max-height: calc(100vh - 48px); display: flex; flex-direction: column; gap: 10px; transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  #app.expanded { max-width: 620px; }
  .header { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: linear-gradient(135deg,#0d0d0d,#111); border: 1px solid rgba(255,105,180,0.3); border-radius: 14px; position: relative; overflow: hidden; flex-shrink: 0; }
  .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,#ff69b4,#00dcff,#ff69b4); background-size: 200% 100%; animation: shimmer 3s linear infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .header-logo { width: 44px; height: 44px; border-radius: 9px; border: 1px solid rgba(255,105,180,0.4); }
  .header-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 17px; color: #fff; letter-spacing: 1px; }
  .header-subtitle { font-size: 11px; color: #00dcff; letter-spacing: 2px; text-transform: uppercase; }
  .notice-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(0,220,255,0.2); border-radius: 10px; padding: 10px 16px; color: #7a99a8; font-size: 11.5px; text-align: center; flex-shrink: 0; }
  .glow-text { color: #00dcff; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .meta-row { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; padding: 0 2px; display: none; }
  .progress { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: #ff69b4; letter-spacing: 0.5px; }
  .timer { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; color: #00dcff; display: none; letter-spacing: 1px; }
  .timer.danger { color: #ff3a3a; animation: timerPulse 0.6s ease-in-out infinite; }
  @keyframes timerPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
  .seg-tracker { display: flex; gap: 3px; width: 100%; flex-wrap: wrap; flex-shrink: 0; display: none; }
  .seg-block { flex: 1; min-width: 18px; height: 7px; border-radius: 2px; background: rgba(255,255,255,0.07); border: 1px solid transparent; transition: 0.25s; cursor: default; }
  .seg-block.clickable { cursor: pointer; }
  .seg-block.clickable:hover { border-color: rgba(255,105,180,0.5); background: rgba(255,105,180,0.2); }
  .seg-block.filled { background: linear-gradient(90deg,#ff69b4,#00dcff); }
  .seg-block.locked { background: rgba(255,105,180,0.18); border-color: rgba(255,105,180,0.35); }
  .seg-block.current { border-color: #00dcff; background: rgba(0,220,255,0.25); }
  .question-card { background: #0d0d0d; border: 1px solid rgba(255,105,180,0.25); border-radius: 14px; padding: 22px; color: #e8e8e8; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 180px; overflow: hidden; }
  .question-card.scrollable { overflow-y: auto; justify-content: flex-start; text-align: left; scrollbar-width: thin; scrollbar-color: rgba(255,105,180,0.25) transparent; }
  .question-card.scrollable::-webkit-scrollbar { width: 3px; }
  .question-card.scrollable::-webkit-scrollbar-thumb { background: rgba(255,105,180,0.25); border-radius: 2px; }
  #input-area { display: none; flex-direction: column; gap: 8px; flex-shrink: 0; }
  #answer { width: 100%; min-height: 110px; padding: 13px; border-radius: 11px; border: 1px solid rgba(255,105,180,0.25); background: #0d0d0d; color: #e8e8e8; outline: none; resize: none; font-family: 'Inter', sans-serif; font-size: 13px; line-height: 1.6; -webkit-user-select: text; user-select: text; transition: border-color 0.2s; }
  #answer:focus { border-color: rgba(0,220,255,0.4); }
  #answer:disabled { color: #404040; border-color: rgba(255,255,255,0.06); cursor: not-allowed; background: #080808; }
  .action-btn { width: 100%; padding: 13px; border-radius: 11px; border: 1px solid rgba(0,220,255,0.4); background: rgba(0,220,255,0.07); color: #00dcff; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
  .action-btn:hover:not(:disabled) { background: linear-gradient(90deg,#ff69b4,#00dcff); border-color: transparent; color: #0a0a0a; }
  .action-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .locked-notice { font-size: 10.5px; color: rgba(255,105,180,0.5); text-align: center; letter-spacing: 1.5px; font-family: 'Rajdhani', sans-serif; text-transform: uppercase; display: none; }
  .credit-text { font-family: 'Rajdhani', sans-serif; font-size: 10px; color: rgba(255,255,255,0.15); text-align: center; letter-spacing: 2px; flex-shrink: 0; padding-top: 5px; }
  .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,220,255,0.15); border-top-color: #00dcff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .instr-wrap { width: 100%; display: flex; flex-direction: column; gap: 0; }
  .instr-title { font-family: 'Rajdhani', sans-serif; font-size: 19px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 14px; letter-spacing: 1px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .info-tile { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 9px; padding: 11px 13px; }
  .info-tile-label { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
  .info-tile-value { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: #00dcff; }
  .info-tile-value.pink { color: #ff69b4; }
  .instr-section { margin-bottom: 14px; }
  .instr-section-title { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; color: rgba(255,105,180,0.7); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 8px; }
  .rule-item { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; color: #8aa4b0; line-height: 1.65; }
  .rule-item:last-child { border-bottom: none; }
  .rule-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,105,180,0.5); margin-top: 8px; flex-shrink: 0; }
  .rule-hl { color: #00dcff; }
  .rule-bold { color: #c8d8e0; font-weight: 500; }
  .review-header { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 4px; letter-spacing: 1px; }
  .review-subhead { font-size: 11.5px; color: rgba(255,255,255,0.3); text-align: center; margin-bottom: 14px; }
  .review-status { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 11.5px; }
  .review-stat { display: flex; align-items: center; gap: 6px; color: #8aa4b0; }
  .review-dot-a { width: 7px; height: 7px; border-radius: 50%; background: #00dcff; }
  .review-dot-m { width: 7px; height: 7px; border-radius: 50%; background: #ff3a3a; }
  .review-list { width: 100%; margin-bottom: 14px; }
  .review-row { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .review-row:last-child { border-bottom: none; }
  .review-qnum { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; color: rgba(255,105,180,0.7); min-width: 26px; padding-top: 1px; letter-spacing: 0.5px; }
  .review-ans { font-size: 11.5px; color: #8aa4b0; line-height: 1.55; word-break: break-word; text-align: left; }
  .review-ans.missing { color: rgba(255,58,58,0.6); font-style: italic; }
  .cooldown-timer-box { background:rgba(255,58,58,0.05); border:1px solid rgba(255,58,58,0.2); padding:15px; border-radius:10px; margin-top: 10px; }
</style>
</head>
<body oncontextmenu="return false;">
<div id="overlay" class="blur-overlay">
  <div class="security-notice">
    <h1>SECURITY PROTOCOL ACTIVE</h1>
    <p>VIEWING RESTRICTED · TAB FOCUS LOST</p>
  </div>
</div>
<div id="main-content" class="content-wrapper">
  <div id="app">
    <div class="header">
      <img src="https://i.imgur.com/mWDOZI5.png" class="header-logo">
      <div>
        <div class="header-title">TMP EXAMINATION</div>
        <div class="header-subtitle">Phase 4 · Written Assessment</div>
      </div>
    </div>
    <div class="notice-card" id="notice">
      <span class="glow-text">Identity Verification Required</span><br>
      <span style="font-size:11px;">Link your Discord account to access Phase 4.</span>
    </div>
    <div class="meta-row" id="metaRow">
      <div class="progress" id="progress">Awaiting Clearance</div>
      <div class="timer" id="timer">⏱ 50:00</div>
    </div>
    <div class="seg-tracker" id="segTracker"></div>
    <div id="question" class="question-card">
      <div style="max-width: 280px; width: 100%;">
         <button class="action-btn" onclick="loginDiscord()">Link Discord Account</button>
      </div>
    </div>
    <div id="input-area">
      <textarea id="answer" placeholder="Type your answer here..."></textarea>
      <div class="locked-notice" id="locked-notice">⚑ &nbsp;Answer locked — cannot be changed</div>
      <div style="display:flex;gap:8px;">
        <button class="action-btn" onclick="showReview()" style="border-color:rgba(0,220,255,0.4);color:#00dcff;flex:1;">Review</button>
        <button class="action-btn" id="submit-btn" onclick="saveAndNext()" style="border-color:rgba(255,105,180,0.5);color:#ff69b4;flex:2;">Submit & Next</button>
      </div>
    </div>
    <div class="credit-text">CREATED BY FAEVYNL</div>
  </div>
</div>
<script>
const WORKER_URL = "https://server.yyourmom96.workers.dev";
const D_CLIENT = '1487244125488152589';
const REDIRECT = window.location.href.split('#')[0];
let current = 0, answers = [], lockedQuestions = [], timerInterval = null, secondsLeft = 3000;
let examStarted = false, mainQuestions = [], reviewMode = false;
let timerStartEpoch = null, submitted = false;
let questionStartTime = null;
let questionDurations = [];
window.dUser = null; window.rUser = null; window.rUsername = "Unknown";

function setAppWidth(mode) {
  const app = document.getElementById('app');
  if (mode === 'wide') app.classList.add('expanded');
  else app.classList.remove('expanded');
}

function getAnsweredCount() {
  return answers.filter(a => a && a.trim()).length;
}

function formatMs(ms) {
  if (!ms || ms <= 0) return "0h 0m 0s";
  let seconds = Math.floor(ms / 1000);
  const h = Math.floor(seconds / 3600);
  seconds %= 3600;
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${h}h ${m}m ${s}s`;
}

async function post(type, extra = {}) {
  return fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ type, ...extra })
  });
}

async function logSecurityEvent(type) {
  if (!examStarted || submitted) return;
  try {
    await post(type, {
      discordId: window.dUser?.id,
      discordUsername: window.dUser?.username,
      robloxId: window.rUser,
      username: window.rUsername
    });
  } catch(err) {}
}

function sendAbandonBeacon() {
  if (!examStarted || submitted) return;
  const payload = JSON.stringify({
    type: "ABANDON_EXAM",
    discordId: window.dUser?.id,
    discordUsername: window.dUser?.username,
    robloxId: window.rUser,
    username: window.rUsername
  });
  fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payload, keepalive: true });
}

window.addEventListener('beforeunload', sendAbandonBeacon);

window.addEventListener('blur', () => {
  if (!examStarted || submitted) return;
  document.getElementById('main-content').classList.add('blur-shield');
  document.getElementById('overlay').classList.add('active');
  logSecurityEvent("BLUR_EVENT");
});

window.addEventListener('focus', () => {
  if (!examStarted || submitted) return;
  document.getElementById('main-content').classList.remove('blur-shield');
  document.getElementById('overlay').classList.remove('active');
});

document.addEventListener('visibilitychange', () => {
  if (!examStarted || submitted) return;
  if (document.hidden) logSecurityEvent("BLUR_EVENT");
});

window.addEventListener('keyup', (e) => {
  if (e.key === 'PrintScreen') {
    logSecurityEvent("SCREENSHOT_EVENT");
    try { navigator.clipboard.writeText('ACCESS DENIED · screenshot detected'); } catch(err) {}
    document.body.innerHTML = `<div style="background:#0a0a0a;color:#ff3a3a;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'Rajdhani';text-align:center;"><h1 style="font-size:40px;letter-spacing:4px;">CRITICAL SECURITY VIOLATION</h1><p style="color:#00dcff;letter-spacing:2px;margin-top:12px;">screenshot detected</p></div>`;
  }
});

document.addEventListener('DOMContentLoaded', () => {
  const answerEl = document.getElementById('answer');
  answerEl.addEventListener('paste', e => e.preventDefault());
  answerEl.addEventListener('copy', e => e.preventDefault());
  answerEl.addEventListener('cut', e => e.preventDefault());
  answerEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveAndNext(); }
  });

  const hash = new URLSearchParams(window.location.hash.slice(1));
  const token = hash.get('access_token');
  if (token) {
    fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.json())
      .then(user => { window.dUser = user; showInstructions(); });
  }
});

function loginDiscord() {
  window.location.href = `https://discord.com/oauth2/authorize?client_id=${D_CLIENT}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`;
}

function setCardScrollable(on) {
  const q = document.getElementById('question');
  if (on) q.classList.add('scrollable');
  else q.classList.remove('scrollable');
}

async function showInstructions() {
  setAppWidth('wide');
  setCardScrollable(false);
  document.getElementById('question').innerHTML = `<div style="color:#00dcff;font-size:12px;"><span class="loading-spinner"></span>Verifying access...</div>`;
  let cooldown, rankData;
  try {
    const [cr, rr] = await Promise.all([
      post("CHECK_COOLDOWN", { discordId: window.dUser.id }),
      post("VERIFY_RANK", { discordId: window.dUser.id })
    ]);
    cooldown = await cr.json();
    rankData = await rr.json();
  } catch {
    document.getElementById('question').innerHTML = `<div style="color:#ff3a3a;font-size:12px;">Connection error. Please refresh.</div>`;
    return;
  }
  if (cooldown.onCooldown) {
    setAppWidth('narrow');
    const timeLeft = formatMs(cooldown.msRemaining);
    document.getElementById('question').innerHTML = `
      <div style="text-align:center;">
        <div style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#ff3a3a;letter-spacing:2px;margin-bottom:8px;">COOLDOWN ACTIVE</div>
        <div style="font-size:12px;color:#556a74;margin-bottom:12px;">You must wait before attempting this exam again.</div>
        <div class="cooldown-timer-box">
          <div style="font-size:10px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Remaining Wait Time</div>
          <div style="font-family:'Rajdhani'; font-size:22px; color:#ff3a3a; font-weight:700; text-shadow: 0 0 10px rgba(255,58,58,0.3);">${timeLeft}</div>
        </div>
      </div>`;
    return;
  }
  if (!rankData.eligible) {
    setAppWidth('narrow');
    document.getElementById('question').innerHTML = `<div style="text-align:center;"><div style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#ff3a3a;letter-spacing:2px;margin-bottom:8px;">ACCESS DENIED</div><div style="font-size:12px;color:#556a74;">You do not meet the rank requirement for this examination.</div></div>`;
    return;
  }
  window.rUser = rankData.robloxId;
  window.rUsername = rankData.robloxUsername;
  document.getElementById('notice').style.display = 'none';
  setCardScrollable(true);
  document.getElementById('question').innerHTML = `
    <div class="instr-wrap">
      <div class="instr-title">Phase 4 — Written Exam</div>
      <div class="info-grid">
        <div class="info-tile"><div class="info-tile-label">Time Limit</div><div class="info-tile-value">50 min</div></div>
        <div class="info-tile"><div class="info-tile-label">Questions</div><div class="info-tile-value">19</div></div>
        <div class="info-tile"><div class="info-tile-label">Format</div><div class="info-tile-value pink">Open book</div></div>
        <div class="info-tile"><div class="info-tile-label">Cooldown</div><div class="info-tile-value pink">24 hours</div></div>
      </div>
      <div class="instr-section">
        <div class="instr-section-title">Exam Details</div>
        <div class="rule-item"><div class="rule-dot"></div><span>You have <span class="rule-hl">50 minutes</span> once the timer starts. It cannot be paused or reset.</span></div>
        <div class="rule-item"><div class="rule-dot"></div><span>Navigate freely between questions using the blocks below the counter — you don't have to answer in order.</span></div>
        <div class="rule-item"><div class="rule-dot"></div><span><span class="rule-bold">Answers are final.</span> Once you submit a question it is locked and cannot be edited.</span></div>
        <div class="rule-item"><div class="rule-dot"></div><span><span class="rule-bold">Progress is not saved.</span> Closing or refreshing the page will lose all unanswered questions.</span></div>
        <div class="rule-item"><div class="rule-dot"></div><span>This is <span class="rule-hl">open book</span> — you may reference any documents during the exam.</span></div>
        <div class="rule-item"><div class="rule-dot"></div><span>There is a <span class="rule-hl">24-hour cooldown</span> between exam attempts.</span></div>
      </div>
      <div class="instr-section">
        <div class="instr-section-title">Rules</div>
        <div class="rule-item"><div class="rule-dot"></div><span>The use of AI to generate answers is <span class="rule-bold">prohibited</span>.</span></div>
        <div class="rule-item"><div class="rule-dot"></div><span>Answers must be in your own words.</span></div>
        <div class="rule-item"><div class="rule-dot"></div><span>Do not share, screenshot, or discuss exam questions with others.</span></div>
      </div>
      <button class="action-btn" onclick="startExam()" style="border-color:rgba(255,105,180,0.5);color:#ff69b4;margin-top:4px;">Begin Exam</button>
    </div>`;
}

function startGlobalTimer(serverSeconds) {
  if (timerInterval) clearInterval(timerInterval);
  timerStartEpoch = Date.now();
  const timerEl = document.getElementById('timer');
  timerEl.style.display = 'block';
  timerEl.classList.remove('danger');
  const tick = () => {
    const elapsed = Math.floor((Date.now() - timerStartEpoch) / 1000);
    secondsLeft = serverSeconds - elapsed;
    if (secondsLeft <= 0) {
      secondsLeft = 0;
      clearInterval(timerInterval);
      timerEl.innerText = "⏱ 0:00";
      finalSubmit();
      return;
    }
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    timerEl.innerText = `⏱ ${m}:${s.toString().padStart(2, '0')}`;
    if (secondsLeft <= 300) timerEl.classList.add('danger');
  };
  tick();
  timerInterval = setInterval(tick, 1000);
}

async function startExam() {
  setAppWidth('narrow');
  reviewMode = false;
  submitted = false;
  setCardScrollable(false);
  document.getElementById('metaRow').style.display = 'flex';
  document.getElementById('segTracker').style.display = 'flex';
  document.getElementById('question').innerHTML = `<div style="color:#00dcff;font-size:12px;"><span class="loading-spinner"></span>Loading exam...</div>`;
  let questRes, logRes;
  try {
    [questRes, logRes] = await Promise.all([
      post("FETCH_QUESTIONS"),
      post("START_EXAM_LOG", { discordId: window.dUser.id, discordUsername: window.dUser.username, robloxId: window.rUser, username: window.rUsername })
    ]);
  } catch {
    document.getElementById('question').innerHTML = `<div style="color:#ff3a3a;font-size:12px;">Connection error. Please refresh and try again.</div>`;
    return;
  }
  const data = await questRes.json();
  const logData = await logRes.json();
  mainQuestions = data.questions;
  answers = new Array(mainQuestions.length).fill("");
  lockedQuestions = new Array(mainQuestions.length).fill(false);
  current = 0;
  const serverSeconds = Math.floor(Number(logData.secondsLeft));
  if (serverSeconds <= 0) {
    document.getElementById('question').innerHTML = `<div style="text-align:center;"><div style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#ff3a3a;letter-spacing:2px;margin-bottom:8px;">TIME EXPIRED</div></div>`;
    return;
  }
  examStarted = true;
  buildSegTracker(mainQuestions.length);
  document.getElementById('input-area').style.display = 'flex';
  startGlobalTimer(serverSeconds);
  loadQuestion();
}

function buildSegTracker(total) {
  const tracker = document.getElementById('segTracker');
  tracker.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const b = document.createElement('div');
    b.className = 'seg-block';
    b.id = `seg-${i}`;
    tracker.appendChild(b);
  }
}

function updateSegTracker() {
  mainQuestions.forEach((_, i) => {
    const b = document.getElementById(`seg-${i}`);
    if (!b) return;
    b.className = 'seg-block';
    if (examStarted && !reviewMode) {
      b.classList.add('clickable');
      b.onclick = () => jumpToQuestion(i);
    }
    if (lockedQuestions[i]) b.classList.add('locked');
    else if (answers[i] && answers[i].trim()) b.classList.add('filled');
    if (i === current) b.classList.add('current');
  });
}

function jumpToQuestion(i) {
  if (reviewMode) return;
  if (questionStartTime && !lockedQuestions[current]) {
    const elapsed = Math.floor((Date.now() - questionStartTime) / 1000);
    questionDurations[current] = (questionDurations[current] || 0) + elapsed;
  }
  current = i;
  loadQuestion();
}

function loadQuestion() {
  setCardScrollable(false);
  document.getElementById('progress').innerText = `Question ${current + 1} / ${mainQuestions.length}`;
  updateSegTracker();
  const answerEl = document.getElementById('answer');
  const submitBtn = document.getElementById('submit-btn');
  const lockedNotice = document.getElementById('locked-notice');
  const isLocked = lockedQuestions[current];
  answerEl.value = answers[current] || '';
  answerEl.disabled = isLocked;
  submitBtn.disabled = isLocked;
  lockedNotice.style.display = isLocked ? 'block' : 'none';
  document.getElementById('question').innerText = mainQuestions[current];
  if (!isLocked) {
    questionStartTime = Date.now();
  }
}

function saveAndNext() {
  const val = document.getElementById('answer').value.trim();
  if (!val) return;
  if (questionStartTime) {
    const elapsed = Math.floor((Date.now() - questionStartTime) / 1000);
    questionDurations[current] = (questionDurations[current] || 0) + elapsed;
    questionStartTime = null;
  }
  answers[current] = val;
  lockedQuestions[current] = true;
  if (current < mainQuestions.length - 1) { current++; loadQuestion(); } else { showReview(); }
}

function showReview() {
  setAppWidth('wide');
  reviewMode = true;
  setCardScrollable(true);
  document.getElementById('input-area').style.display = 'none';
  updateSegTracker();
  const answered = getAnsweredCount();
  const missing = mainQuestions.length - answered;
  let html = `<div style="width:100%;">`;
  html += `<div class="review-header">Review Answers</div>`;
  html += `<div class="review-subhead">Read over your answers before final submission.</div>`;
  html += `<div class="review-status"><div class="review-stat"><div class="review-dot-a"></div>${answered} answered</div><div class="review-stat"><div class="review-dot-m"></div>${missing} unanswered</div></div>`;
  html += `<div class="review-list">`;
  mainQuestions.forEach((q, i) => {
    const ans = answers[i] && answers[i].trim();
    html += `<div class="review-row"><div class="review-qnum">Q${i + 1}</div><div class="review-ans ${ans ? '' : 'missing'}">${ans || 'No answer given'}</div></div>`;
  });
  html += `</div><div style="display:flex;gap:8px;">`;
  if (examStarted && secondsLeft > 0) html += `<button class="action-btn" onclick="resumeFromReview()" style="border-color:rgba(0,220,255,0.4);color:#00dcff;flex:1;">Go Back</button>`;
  html += `<button class="action-btn" onclick="finalSubmit()" style="border-color:rgba(255,105,180,0.5);color:#ff69b4;flex:2;">Submit Exam</button></div></div>`;
  document.getElementById('question').innerHTML = html;
}

function resumeFromReview() {
  setAppWidth('narrow');
  reviewMode = false;
  setCardScrollable(false);
  document.getElementById('input-area').style.display = 'flex';
  loadQuestion();
}

async function finalSubmit() {
  setAppWidth('narrow');
  submitted = true;
  examStarted = false;
  reviewMode = true;
  clearInterval(timerInterval);
  setCardScrollable(false);
  const totalUsed = Math.floor((Date.now() - timerStartEpoch) / 1000);
  document.getElementById('question').innerHTML = `<div style="color:#00dcff;font-size:12px;"><span class="loading-spinner"></span>Submitting...</div>`;
  try {
    const submitRes = await post("SUBMIT_EXAM", {
      discordId: window.dUser.id,
      username: window.rUsername,
      discordUsername: window.dUser.username,
      robloxId: window.rUser,
      answers,
      used: totalUsed,
      questionDurations: questionDurations.filter(d => d !== undefined),
      secondsLeft
    });
    const result = await submitRes.json();
    if (submitRes.ok && result.success) {
      document.getElementById('question').innerHTML = `<div style="text-align:center;"><div style="font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#00dcff;letter-spacing:2px;margin-bottom:10px;">SUBMITTED</div><div style="font-size:12px;color:#556a74;line-height:1.6;">Your exam has been received and will be reviewed shortly.</div></div>`;
      document.getElementById('input-area').style.display = 'none';
      document.getElementById('metaRow').style.display = 'none';
      document.getElementById('segTracker').style.display = 'none';
    } else {
      submitted = false; examStarted = true;
      document.getElementById('question').innerHTML = `<div style="color:#ff3a3a;font-size:12px;">Submission failed.</div><button class="action-btn" onclick="showReview()" style="margin-top:10px;">Try Again</button>`;
    }
  } catch {
    submitted = false; examStarted = true;
    document.getElementById('question').innerHTML = `<div style="color:#ff3a3a;font-size:12px;">Connection error.</div><button class="action-btn" onclick="showReview()" style="margin-top:10px;">Try Again</button>`;
  }
}
</script>
