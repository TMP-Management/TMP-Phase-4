<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMP Phase 4 | Written Assessment</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
  body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 20% 50%, rgba(255, 105, 180, 0.12) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(0, 220, 255, 0.12) 0%, transparent 50%), radial-gradient(ellipse at 60% 80%, rgba(120, 0, 255, 0.07) 0%, transparent 50%); animation: bgShift 12s ease-in-out infinite alternate; z-index: 0; pointer-events: none; }
  @keyframes bgShift { 0% { transform: translate(0%, 0%) rotate(0deg); } 100% { transform: translate(2%, 5%) rotate(4deg); } }
  .content-wrapper { width: 100%; display: flex; justify-content: center; align-items: center; transition: filter 0.3s ease, transform 0.3s ease; z-index: 1; }
  .blur-shield { filter: blur(45px) grayscale(100%); transform: scale(0.92); pointer-events: none; }
  .blur-overlay { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.85); backdrop-filter: blur(25px); justify-content: center; align-items: center; text-align: center; border: 2px solid rgba(255,105,180,0.4); }
  .blur-overlay.active { display: flex; }
  .security-notice { font-family: 'Rajdhani', sans-serif; }
  .security-notice h1 { color: #ff3a3a; font-size: 28px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255, 58, 58, 0.5); }
  .security-notice p { color: #00dcff; font-size: 14px; letter-spacing: 1px; }
  #app { position: relative; width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 12px; }
  .header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: linear-gradient(135deg, #0d0d0d, #111); border: 1px solid rgba(255,105,180,0.3); border-radius: 16px; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #ff69b4, #00dcff, #ff69b4); background-size: 200% 100%; animation: shimmer 3s linear infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .header-logo { width: 48px; height: 48px; border-radius: 10px; border: 1px solid rgba(255,105,180,0.4); }
  .header-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; color: #fff; letter-spacing: 1px; }
  .header-subtitle { font-size: 12px; color: #00dcff; letter-spacing: 2px; text-transform: uppercase; }
  .notice-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(0,220,255,0.25); border-radius: 12px; padding: 12px 16px; color: #99b4c0; font-size: 12px; text-align: center; }
  .glow-text { color: #00dcff; font-weight: 700; text-transform: uppercase; }
  .meta-row { display: flex; justify-content: space-between; align-items: center; }
  .progress { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: #ff69b4; }
  .timer { font-family: 'Rajdhani', sans-serif; font-weight: 700; color: #00dcff; display: none; }
  .timer.danger { color: #ff3a3a; animation: timerPulse 0.6s ease-in-out infinite; }
  @keyframes timerPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
  .seg-tracker { display: flex; gap: 4px; width: 100%; flex-wrap: wrap; }
  .seg-block { flex: 1; min-width: 20px; height: 8px; border-radius: 3px; background: rgba(255,255,255,0.08); border: 1px solid transparent; transition: 0.3s; cursor: default; }
  .seg-block.clickable { cursor: pointer; }
  .seg-block.clickable:hover { border-color: #ff69b4; background: rgba(255,105,180,0.3); }
  .seg-block.filled { background: linear-gradient(90deg, #ff69b4, #00dcff); }
  .seg-block.current { border-color: #00dcff; background: rgba(0,220,255,0.3); }
  .question-card { background: #0d0d0d; border: 1px solid rgba(255,105,180,0.3); border-radius: 16px; padding: 24px; color: #f0f0f0; min-height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  #input-area { display: none; flex-direction: column; gap: 10px; }
  #answer { width: 100%; min-height: 120px; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,105,180,0.3); background: #0d0d0d; color: #fff; outline: none; resize: none; -webkit-user-select: text; user-select: text; }
  .action-btn { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,220,255,0.5); background: rgba(0,220,255,0.1); color: #00dcff; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; text-transform: uppercase; transition: 0.2s; }
  .action-btn:hover { background: linear-gradient(90deg, #ff69b4, #00dcff); color: #000; }
  .credit-text { font-family: 'Rajdhani', sans-serif; font-size: 10px; color: rgba(255,255,255,0.2); text-align: center; margin-top: 15px; letter-spacing: 2px; }
</style>
</head>
<body oncontextmenu="return false;">
<div id="overlay" class="blur-overlay">
    <div class="security-notice">
        <h1>SECURITY PROTOCOL ACTIVE</h1>
        <p>VIEWING RESTRICTED · TAB FOCUS LOST</p>
    </div>
</div>
<div id="main-content" class="content-wrapper">
  <div id="app">
    <div class="header">
      <img src="https://i.imgur.com/mWDOZI5.png" class="header-logo">
      <div class="header-text">
        <div class="header-title">TMP EXAMINATION</div>
        <div class="header-subtitle">Phase 4 · Written Assessment</div>
      </div>
    </div>
    <div class="notice-card" id="notice">
      <span class="glow-text">Identity Verification</span><br>Link Discord to access Phase 4.
    </div>
    <div class="meta-row">
      <div class="progress" id="progress">Awaiting Clearance</div>
      <div class="timer" id="timer">⏱ 50:00</div>
    </div>
    <div class="seg-tracker" id="segTracker"></div>
    <div id="question" class="question-card">
      <button class="action-btn" onclick="loginDiscord()">Link Discord Account</button>
    </div>
    <div id="input-area">
      <textarea id="answer" placeholder="Type your answer here..." onpaste="return false;" oncopy="return false;" oncut="return false;" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveAndNext();}"></textarea>
      <div class="btn-row" style="display:flex;gap:10px;width:100%;">
        <button class="action-btn" onclick="showReview()" style="border-color:#00dcff; color:#00dcff; flex:1;">Review</button>
        <button class="action-btn" onclick="saveAndNext()" style="border-color:#ff69b4; color:#ff69b4; flex:2;">Submit</button>
      </div>
    </div>
    <div id="credit" class="credit-text">SYSTEM DESIGN BY FAEVYNL</div>
  </div>
</div>
<script>
const WORKER_URL = "https://server.yyourmom96.workers.dev";
const D_CLIENT = '1487244125488152589';
const REDIRECT = window.location.href.split('#')[0];
const TIME_LIMIT = 3000;

let current = 0, answers = [], timerInterval = null, secondsLeft = TIME_LIMIT;
let examStarted = false, mainQuestions = [];
window.dUser = null; window.rUser = null;

window.addEventListener('keyup', async (e) => {
    if (e.key === 'PrintScreen') {
        navigator.clipboard.writeText('ACCESS DENIED · SECURITY BREACH LOGGED');
        try {
            await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ type: "SCREENSHOT_EVENT", discordId: window.dUser?.id, discordUsername: window.dUser?.username })
            });
        } catch(e) {}
        document.body.innerHTML = `
            <div style="background:#0a0a0a; color:#ff3a3a; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; font-family:'Rajdhani'; text-align:center;">
                <h1 style="font-size:40px;">CRITICAL SECURITY VIOLATION</h1>
                <p style="color:#00dcff;">Unauthorized Screen Capture Attempt Recorded.</p>
                <p style="margin-top:20px; font-size:12px; color:rgba(255,255,255,0.3);">INCIDENT REF: ${Date.now()}</p>
            </div>`;
    }
});

window.addEventListener('blur', () => { if (examStarted) { document.getElementById('main-content').classList.add('blur-shield'); document.getElementById('overlay').classList.add('active'); } });
window.addEventListener('focus', () => { document.getElementById('main-content').classList.remove('blur-shield'); document.getElementById('overlay').classList.remove('active'); });

function saveKey() { return "tmp_v4_" + (window.dUser?.id || 'anon'); }
function saveProgress() {
    const curVal = document.getElementById('answer')?.value || '';
    if (examStarted && curVal.trim()) answers[current] = curVal;
    localStorage.setItem(saveKey(), JSON.stringify({ current, answers, rUser: window.rUser, questions: mainQuestions }));
}

function loadProgress() { try { return JSON.parse(localStorage.getItem(saveKey())); } catch(e) { return null; } }

function buildSegTracker(total) {
    const tracker = document.getElementById('segTracker');
    tracker.innerHTML = '';
    for (let i = 0; i < total; i++) {
        const b = document.createElement('div');
        b.className = 'seg-block';
        b.id = `seg-${i}`;
        tracker.appendChild(b);
    }
}

function updateSegTracker() {
    mainQuestions.forEach((_, i) => {
        const b = document.getElementById(`seg-${i}`);
        if (!b) return;
        b.className = 'seg-block';
        if (examStarted) b.classList.add('clickable');
        if (answers[i] && answers[i].trim()) b.classList.add('filled');
        if (i === current) b.classList.add('current');
        b.onclick = examStarted ? () => jumpToQuestion(i) : null;
    });
}

function jumpToQuestion(i) {
    if (document.getElementById('input-area').style.display === 'flex') {
        answers[current] = document.getElementById('answer').value.trim();
    }
    current = i;
    saveProgress();
    
    // Ensure input area is visible if returning from review
    if (!examStarted && secondsLeft > 0) {
        examStarted = true;
        document.getElementById('input-area').style.display = 'flex';
        // Restart timer display if it was cleared
        if(!timerInterval) startGlobalTimer(); 
    }
    
    loadQuestion();
}

function loginDiscord() { window.location.href = `https://discord.com/oauth2/authorize?client_id=${D_CLIENT}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`; }

async function showInstructions() {
    const [cooldownRes, rankRes] = await Promise.all([
        fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ type: "CHECK_COOLDOWN", discordId: window.dUser.id }) }),
        fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ type: "VERIFY_RANK", discordId: window.dUser.id }) })
    ]);
    const cooldown = await cooldownRes.json();
    const rankData = await rankRes.json();
    if (cooldown.onCooldown) { document.getElementById('question').innerHTML = `<div style='color:#ff3a3a;font-weight:700;'>COOLDOWN ACTIVE</div>`; return; }
    if (!rankData.eligible) { document.getElementById('question').innerHTML = `<div style='color:#ff3a3a;font-weight:700;'>UNAUTHORIZED RANK</div>`; return; }
    window.rUser = rankData.robloxId;
    const saved = loadProgress();
    document.getElementById('question').innerHTML = `
        <div style="text-align:left;width:100%;">
            <div style="font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:#ff69b4;text-align:center;margin-bottom:12px;">PHASE 4</div>
            <div style="font-size:13px;color:#b0c8d4;line-height:1.75;margin-bottom:16px;text-align:center;">50 minute timer · Open book<br>Timer starts when you begin and cannot be reset.</div>
            ${saved ? `<button class="action-btn" onclick="resumeExam()" style="margin-bottom:8px; border-color:#ff69b4; color:#ff69b4;">Resume Exam</button>` : ''}
            <button class="action-btn" onclick="startExam()">Begin Exam</button>
        </div>`;
}

async function startExam() {
    const res = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ type: "FETCH_QUESTIONS" }) });
    const data = await res.json();
    const logRes = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ type: "START_EXAM_LOG", discordId: window.dUser.id, robloxId: window.rUser, discordUsername: window.dUser.username }) });
    const logData = await logRes.json();
    mainQuestions = data.questions;
    if (answers.length === 0) answers = new Array(mainQuestions.length).fill("");
    const elapsed = Math.floor((Date.now() - logData.startTime) / 1000);
    secondsLeft = Math.max(0, 3000 - elapsed);
    examStarted = true;
    buildSegTracker(mainQuestions.length);
    document.getElementById('notice').style.display = 'none';
    document.getElementById('input-area').style.display = 'flex';
    if(!timerInterval) startGlobalTimer();
    loadQuestion();
}

function resumeExam() { const saved = loadProgress(); mainQuestions = saved.questions; answers = saved.answers; current = saved.current; startExam(); }

function startGlobalTimer() {
    const timerEl = document.getElementById('timer');
    timerEl.style.display = 'block';
    timerInterval = setInterval(() => {
        secondsLeft--;
        const m = Math.floor(secondsLeft/60), s = secondsLeft%60;
        timerEl.innerText = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
        if (secondsLeft <= 300) timerEl.classList.add('danger');
        if (secondsLeft <= 0) { clearInterval(timerInterval); showReview(); }
    }, 1000);
}

function loadQuestion() {
    document.getElementById('progress').innerText = `Question ${current + 1} / ${mainQuestions.length}`;
    updateSegTracker();
    document.getElementById('answer').value = answers[current] || '';
    document.getElementById('question').innerText = mainQuestions[current];
}

function saveAndNext() {
    answers[current] = document.getElementById('answer').value.trim();
    if (current < mainQuestions.length - 1) { current++; saveProgress(); loadQuestion(); } else { showReview(); }
}

function showReview() {
    examStarted = false; 
    // We don't clear the interval so the timer keeps running in the background until final submission
    document.getElementById('input-area').style.display = 'none';
    let html = `<div style="text-align:left;max-height:300px;overflow-y:auto;width:100%;font-size:12px;color:#00dcff;">`;
    mainQuestions.forEach((q, i) => { html += `<div style="border-bottom:1px solid #333;padding:8px 0;">[Q${i+1}] ${answers[i] || 'MISSING'}</div>`; });
    html += `</div>
    <div style="display:flex;gap:10px;width:100%;margin-top:15px;">
        <button class="action-btn" onclick="startExam()" style="border-color:#00dcff; color:#00dcff; flex:1;">Back</button>
        <button class="action-btn" onclick="finalSubmit()" style="border-color:#ff69b4; color:#ff69b4; flex:2;">Submit Exam</button>
    </div>`;
    document.getElementById('question').innerHTML = html;
}

async function finalSubmit() {
    examStarted = false;
    clearInterval(timerInterval);
    document.getElementById('question').innerHTML = "Submitting...";
    let content = `**Roblox**: ${window.rUser}\n**Discord**: ${window.dUser.username}\n\n`;
    mainQuestions.forEach((q, i) => { content += `**Q${i+1}:** ${q}\n> ${answers[i] || 'No Response'}\n\n`; });
    await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ discordId: window.dUser.id, username: window.rUser, discordUsername: window.dUser.username, content, secondsLeft }) });
    localStorage.removeItem(saveKey());
    document.getElementById('question').innerHTML = "Submitted successfully.";
}

window.onload = () => {
    const hash = new URLSearchParams(window.location.hash.slice(1));
    const token = hash.get('access_token');
    if (token) {
        fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } })
        .then(res => res.json()).then(user => { window.dUser = user; showInstructions(); });
    }
};
</script>
</body>
</html>
