<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMP Phase 4 | Written Assessment</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; display: flex; justify-content: center; align-items: center; padding: 24px; }
  body::before { content: ''; position: fixed; inset: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 20% 50%, rgba(255,105,180,0.12) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(0,220,255,0.12) 0%, transparent 50%), radial-gradient(ellipse at 60% 80%, rgba(120,0,255,0.07) 0%, transparent 50%); animation: bgShift 12s ease-in-out infinite alternate; z-index: 0; pointer-events: none; }
  @keyframes bgShift { 0% { transform: translate(0%,0%) rotate(0deg); } 100% { transform: translate(2%,5%) rotate(4deg); } }
  .content-wrapper { width: 100%; display: flex; justify-content: center; align-items: center; transition: filter 0.3s ease, transform 0.3s ease; z-index: 1; }
  .blur-overlay { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.85); backdrop-filter: blur(25px); justify-content: center; align-items: center; text-align: center; border: 2px solid rgba(255,105,180,0.4); }
  .blur-overlay.active { display: flex; }
  .focus-notice { font-family: 'Rajdhani', sans-serif; }
  .focus-notice h1 { color: #ff3a3a; font-size: 28px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255,58,58,0.5); }
  .focus-notice p { color: #00dcff; font-size: 14px; letter-spacing: 1px; }
  #app { position: relative; width: 100%; max-width: 480px; height: auto; max-height: calc(100vh - 48px); display: flex; flex-direction: column; gap: 10px; transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  #app.expanded { max-width: 620px; }
  .header { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: linear-gradient(135deg,#0d0d0d,#111); border: 1px solid rgba(255,105,180,0.3); border-radius: 14px; position: relative; overflow: hidden; flex-shrink: 0; }
  .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,#ff69b4,#00dcff,#ff69b4); background-size: 200% 100%; animation: shimmer 3s linear infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .header-logo { width: 44px; height: 44px; border-radius: 9px; border: 1px solid rgba(255,105,180,0.4); }
  .header-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 17px; color: #fff; letter-spacing: 1px; }
  .header-subtitle { font-size: 11px; color: #00dcff; letter-spacing: 2px; text-transform: uppercase; }
  .notice-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(0,220,255,0.2); border-radius: 10px; padding: 10px 16px; color: #7a99a8; font-size: 11.5px; text-align: center; flex-shrink: 0; }
  .glow-text { color: #00dcff; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .meta-row { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; padding: 0 2px; display: none; }
  .progress { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: #ff69b4; letter-spacing: 0.5px; }
  .timer { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; color: #00dcff; display: none; letter-spacing: 1px; }
  .timer.danger { color: #ff3a3a; animation: timerPulse 0.6s ease-in-out infinite; }
  @keyframes timerPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
  .seg-tracker { display: flex; gap: 3px; width: 100%; flex-wrap: wrap; flex-shrink: 0; display: none; }
  .seg-block { flex: 1; min-width: 18px; height: 7px; border-radius: 2px; background: rgba(255,255,255,0.07); border: 1px solid transparent; transition: 0.25s; cursor: default; }
  .seg-block.clickable { cursor: pointer; }
  .seg-block.clickable:hover { border-color: rgba(255,105,180,0.5); background: rgba(255,105,180,0.2); }
  .seg-block.filled { background: linear-gradient(90deg,#ff69b4,#00dcff); }
  .seg-block.locked { background: rgba(255,105,180,0.18); border-color: rgba(255,105,180,0.35); }
  .seg-block.current { border-color: #00dcff; background: rgba(0,220,255,0.25); }
  .question-card { background: #0d0d0d; border: 1px solid rgba(255,105,180,0.25); border-radius: 14px; padding: 22px; color: #e8e8e8; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 180px; overflow: hidden; }
  .question-card.scrollable { overflow-y: auto; justify-content: flex-start; text-align: left; scrollbar-width: thin; scrollbar-color: rgba(255,105,180,0.25) transparent; }
  .question-card.scrollable::-webkit-scrollbar { width: 3px; }
  .question-card.scrollable::-webkit-scrollbar-thumb { background: rgba(255,105,180,0.25); border-radius: 2px; }
  #input-area { display: none; flex-direction: column; gap: 8px; flex-shrink: 0; }
  #answer { width: 100%; min-height: 110px; padding: 13px; border-radius: 11px; border: 1px solid rgba(255,105,180,0.25); background: #0d0d0d; color: #e8e8e8; outline: none; resize: none; font-family: 'Inter', sans-serif; font-size: 13px; line-height: 1.6; -webkit-user-select: text; user-select: text; transition: border-color 0.2s; }
  #answer:focus { border-color: rgba(0,220,255,0.4); }
  #answer:disabled { color: #404040; border-color: rgba(255,255,255,0.06); cursor: not-allowed; background: #080808; }
  .action-btn { width: 100%; padding: 13px; border-radius: 11px; border: 1px solid rgba(0,220,255,0.4); background: rgba(0,220,255,0.07); color: #00dcff; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
  .action-btn:hover:not(:disabled) { background: linear-gradient(90deg,#ff69b4,#00dcff); border-color: transparent; color: #0a0a0a; }
  .action-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .locked-notice { font-size: 10.5px; color: rgba(255,105,180,0.5); text-align: center; letter-spacing: 1.5px; font-family: 'Rajdhani', sans-serif; text-transform: uppercase; display: none; }
  .credit-text { font-family: 'Rajdhani', sans-serif; font-size: 10px; color: rgba(255,255,255,0.15); text-align: center; letter-spacing: 2px; flex-shrink: 0; padding-top: 5px; }
  .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,220,255,0.15); border-top-color: #00dcff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .instr-wrap { width: 100%; display: flex; flex-direction: column; gap: 0; }
  .instr-title { font-family: 'Rajdhani', sans-serif; font-size: 19px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 14px; letter-spacing: 1px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .info-tile { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 9px; padding: 11px 13px; }
  .info-tile-label { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
  .info-tile-value { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: #00dcff; }
  .info-tile-value.pink { color: #ff69b4; }
  .instr-section { margin-bottom: 14px; }
  .instr-section-title { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; color: rgba(255,105,180,0.7); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 8px; }
  .rule-item { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; color: #8aa4b0; line-height: 1.65; }
  .rule-item:last-child { border-bottom: none; }
  .rule-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,105,180,0.5); margin-top: 8px; flex-shrink: 0; }
  .rule-bold { color: #c8d8e0; font-weight: 500; }
  .review-header { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 4px; letter-spacing: 1px; }
  .review-list { width: 100%; margin-bottom: 14px; }
  .review-row { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .review-row:last-child { border-bottom: none; }
  .review-qnum { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; color: rgba(255,105,180,0.7); min-width: 26px; padding-top: 1px; letter-spacing: 0.5px; }
  .review-ans { font-size: 11.5px; color: #8aa4b0; line-height: 1.55; word-break: break-word; text-align: left; }
  .review-ans.missing { color: rgba(255,58,58,0.6); font-style: italic; }
  .cooldown-timer-box { background:rgba(255,58,58,0.05); border:1px solid rgba(255,58,58,0.2); padding:15px; border-radius:10px; margin-top: 10px; }
  .instr-alert { background: rgba(255,105,180,0.06); border: 1px solid rgba(255,105,180,0.2); border-radius: 9px; padding: 10px 14px; margin-bottom: 14px; font-size: 12px; color: #c8a0b0; line-height: 1.6; text-align: center; }
  .instr-alert strong { color: #ff69b4; }
</style>
</head>
<body oncontextmenu="return false;">
<div id="overlay" class="blur-overlay">
  <div class="focus-notice">
    <h1>FOCUS LOST</h1>
    <p>RETURN TO THE TAB TO CONTINUE</p>
  </div>
</div>
<div id="main-content" class="content-wrapper">
  <div id="app">
    <div class="header">
      <img src="https://i.imgur.com/mWDOZI5.png" class="header-logo">
      <div>
        <div class="header-title">TMP EXAMINATION</div>
        <div class="header-subtitle">Phase 4 · Written Assessment</div>
      </div>
    </div>
    <div class="notice-card" id="notice">
      <span class="glow-text">Identity Verification Required</span><br>
      <span style="font-size:11px;">Link your Discord account to access Phase 4.</span>
    </div>
    <div class="meta-row" id="metaRow">
      <div class="progress" id="progress">Awaiting Clearance</div>
      <div class="timer" id="timer">⏱ 80:00</div>
    </div>
    <div class="seg-tracker" id="segTracker"></div>
    <div id="question" class="question-card">
      <div style="max-width: 280px; width: 100%;">
         <button class="action-btn" id="login-btn">Link Discord Account</button>
      </div>
    </div>
    <div id="input-area">
      <textarea id="answer" placeholder="Type your answer here..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
      <div class="locked-notice" id="locked-notice">⚑ &nbsp;Answer locked — cannot be changed</div>
      <div style="display:flex;gap:8px;">
        <button class="action-btn" id="review-btn" style="border-color:rgba(0,220,255,0.4);color:#00dcff;flex:1;">Review</button>
        <button class="action-btn" id="submit-btn" style="border-color:rgba(255,105,180,0.5);color:#ff69b4;flex:2;">Submit & Next</button>
      </div>
    </div>
    <div class="credit-text">CREATED BY FAEVYNL</div>
  </div>
</div>
<script>
(function() {
  'use strict';

  const _dateNow       = Date.now.bind(Date);
  const _setInterval   = window.setInterval.bind(window);
  const _clearInterval = window.clearInterval.bind(window);
  const _fetch         = window.fetch.bind(window);
  const _stringify     = JSON.stringify.bind(JSON);
  const _nativeValueDesc = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value');

  const WORKER_URL      = "https://server.yyourmom96.workers.dev";
  const D_CLIENT        = '1487244125488152589';
  const REDIRECT        = window.location.origin + window.location.pathname;
  const MAX_ANSWER_LEN  = 4000;

  let current           = 0;
  let answers           = [];
  let shadowAnswers     = [];
  let lockedQuestions   = [];
  let timerInterval     = null;
  let secondsLeft       = 4800;
  let serverSecondsAtStart = 4800;
  let timerStartEpoch   = null;
  let examStarted       = false;
  let mainQuestions     = [];
  let reviewMode        = false;
  let submitted         = false;
  let lastProgressSent  = null;
  let questionStartTime = null;
  let questionDurations = [];
  let autoSubmitted     = false;
  let sessionToken      = null;
  let dUser             = null;
  let rUser             = null;
  let rUsername         = "Unknown";
  let abandonedSent     = false;
  let selectAllPending  = false;

  const answerEl  = document.getElementById('answer');
  const submitBtn = document.getElementById('submit-btn');
  const reviewBtn = document.getElementById('review-btn');
  const timerEl   = document.getElementById('timer');
  const progressEl = document.getElementById('progress');

  function nativeSet(val) {
    _nativeValueDesc.set.call(answerEl, val);
  }

  function startMutationGuard() {
    const mo = new MutationObserver(function() {
      if (!examStarted || submitted) return;
      const shouldBeDisabled = lockedQuestions[current];
      if (answerEl.disabled !== shouldBeDisabled) answerEl.disabled = shouldBeDisabled;
      if (submitBtn.disabled !== shouldBeDisabled) submitBtn.disabled = shouldBeDisabled;
    });
    mo.observe(answerEl,  { attributes: true, attributeFilter: ['disabled', 'readonly'] });
    mo.observe(submitBtn, { attributes: true, attributeFilter: ['disabled'] });
  }

  function setAppWidth(mode) {
    document.getElementById('app').classList.toggle('expanded', mode === 'wide');
  }

  function getAnsweredCount() {
    return answers.filter(function(a) { return a && a.trim(); }).length;
  }

  function calcAvgFromDurations() {
    const recorded = questionDurations.filter(function(d) { return d > 0; });
    if (!recorded.length) return "0s";
    const avg = Math.round(recorded.reduce(function(a, b) { return a + b; }, 0) / recorded.length);
    return avg < 60 ? avg + "s" : Math.floor(avg / 60) + "m " + (avg % 60) + "s";
  }

  function post(type, extra) {
    const headers = { "Content-Type": "application/json" };
    if (sessionToken) headers["X-Exam-Token"] = sessionToken;
    return _fetch(WORKER_URL, {
      method: "POST",
      headers: headers,
      body: _stringify(Object.assign({ type: type }, extra || {}))
    });
  }

  function postKeepalive(type, extra) {
    const headers = { "Content-Type": "application/json" };
    if (sessionToken) headers["X-Exam-Token"] = sessionToken;
    _fetch(WORKER_URL, {
      method: "POST",
      headers: headers,
      body: _stringify(Object.assign({ type: type }, extra || {})),
      keepalive: true
    }).catch(function() {});
  }

  function examIdentity() {
    return {
      discordId: dUser && dUser.id,
      discordUsername: dUser && dUser.username,
      robloxId: rUser,
      username: rUsername
    };
  }

  function logEvent(type) {
    if (!examStarted || submitted) return;
    post(type, examIdentity()).catch(function() {});
  }

  function sendAbandonedEvent() {
    if (!examStarted || submitted || abandonedSent) return;
    abandonedSent = true;
    postKeepalive("EXAM_ABANDONED", Object.assign(examIdentity(), {
      answeredCount: getAnsweredCount(),
      totalCount: mainQuestions.length,
      secondsLeft: secondsLeft,
      avgTime: calcAvgFromDurations()
    }));
  }

  window.addEventListener('pagehide',     sendAbandonedEvent);
  window.addEventListener('beforeunload', sendAbandonedEvent);

  window.addEventListener('blur', function() {
    if (!examStarted || submitted) return;
    document.getElementById('overlay').classList.add('active');
    logEvent("BLUR_EVENT");
  });

  window.addEventListener('focus', function() {
    if (!examStarted || submitted) return;
    document.getElementById('overlay').classList.remove('active');
  });

  window.addEventListener('keyup', function(e) {
    if (e.key !== 'PrintScreen') return;
    if (examStarted && !submitted) {
      postKeepalive("SCREENSHOT_EVENT", examIdentity());
    }
    document.body.innerHTML = '<div style="background:#0a0a0a;color:#ff3a3a;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:\'Rajdhani\';text-align:center;"><h1 style="font-size:40px;letter-spacing:4px;">VIOLATION DETECTED</h1><p style="color:#00dcff;letter-spacing:2px;margin-top:12px;">screenshot captured</p></div>';
  });

  function handleAnswerKeydown(e) {
    if (!examStarted || submitted) { e.preventDefault(); return; }
    if (lockedQuestions[current]) { e.preventDefault(); return; }

    const ctrl = e.ctrlKey || e.metaKey;

    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveAndNext(); return; }

    if (ctrl && (e.key === 'v' || e.key === 'V' ||
                 e.key === 'c' || e.key === 'C' ||
                 e.key === 'x' || e.key === 'X' ||
                 e.key === 'z' || e.key === 'Z' ||
                 e.key === 'y' || e.key === 'Y')) {
      e.preventDefault(); return;
    }

    if (ctrl && (e.key === 'a' || e.key === 'A')) {
      selectAllPending = true; return;
    }

    if (e.key === 'Backspace' || e.key === 'Delete') {
      e.preventDefault();
      if (selectAllPending) { shadowAnswers[current] = ''; selectAllPending = false; }
      else { shadowAnswers[current] = (shadowAnswers[current] || '').slice(0, -1); }
      nativeSet(shadowAnswers[current]);
      return;
    }

    if (e.key === 'Enter' && e.shiftKey) {
      e.preventDefault();
      const cur = shadowAnswers[current] || '';
      if (cur.length < MAX_ANSWER_LEN) {
        shadowAnswers[current] = selectAllPending ? '\n' : cur + '\n';
        selectAllPending = false;
        nativeSet(shadowAnswers[current]);
      }
      return;
    }

    if (e.key.length === 1 && !ctrl) {
      e.preventDefault();
      const cur = shadowAnswers[current] || '';
      if (cur.length < MAX_ANSWER_LEN) {
        shadowAnswers[current] = selectAllPending ? e.key : cur + e.key;
        selectAllPending = false;
        nativeSet(shadowAnswers[current]);
      }
      return;
    }

    const passthrough = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End',
                         'PageUp','PageDown','Escape','Tab','Shift','Control','Alt','Meta',
                         'CapsLock','NumLock','ScrollLock','Insert',
                         'F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12'];
    if (passthrough.indexOf(e.key) === -1) e.preventDefault();
    if (e.key !== 'Control' && e.key !== 'Meta' && e.key !== 'Shift' && e.key !== 'Alt') {
      selectAllPending = false;
    }
  }

  function handleAnswerInput() {
    if (!examStarted || submitted) { nativeSet(''); return; }
    nativeSet(shadowAnswers[current] || '');
  }

  function loginDiscord() {
    window.location.href = 'https://discord.com/oauth2/authorize?client_id=' + D_CLIENT +
      '&redirect_uri=' + encodeURIComponent(REDIRECT) + '&response_type=token&scope=identify';
  }

  function showInstructions() {
    setAppWidth('wide');
    const q = document.getElementById('question');
    q.innerHTML = '<div style="color:#00dcff;font-size:12px;"><span class="loading-spinner"></span>Verifying examinee...</div>';
    Promise.all([
      _fetch(WORKER_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: _stringify({type:"CHECK_COOLDOWN", discordId: dUser.id}) }),
      _fetch(WORKER_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: _stringify({type:"VERIFY_RANK",    discordId: dUser.id}) })
    ]).then(function(rs) {
      return Promise.all([rs[0].json(), rs[1].json()]);
    }).then(function(data) {
      const cooldown = data[0];
      const rankData = data[1];
      if (cooldown.onCooldown) {
        setAppWidth('narrow');
        q.innerHTML = '<div style="text-align:center;"><div style="font-family:\'Rajdhani\';font-size:15px;font-weight:700;color:#ff3a3a;letter-spacing:2px;margin-bottom:8px;">COOLDOWN ACTIVE</div><div class="cooldown-timer-box"><div style="font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Wait Time Remaining</div><div style="font-family:\'Rajdhani\';font-size:22px;color:#ff3a3a;font-weight:700;">' + cooldown.timeRemaining + '</div></div></div>';
        return;
      }
      if (!rankData.eligible) {
        setAppWidth('narrow');
        q.innerHTML = '<div style="text-align:center;"><div style="font-family:\'Rajdhani\';font-size:15px;font-weight:700;color:#ff3a3a;letter-spacing:2px;">ACCESS DENIED</div><div style="font-size:12px;color:#556a74;">Rank requirement not met.</div></div>';
        return;
      }
      sessionToken = rankData.sessionToken || null;
      rUser        = rankData.robloxId;
      rUsername    = rankData.robloxUsername;
      document.getElementById('notice').style.display = 'none';
      q.classList.add('scrollable');
      q.innerHTML =
        '<div class="instr-wrap">' +
        '<div class="instr-title">Phase 4 — Written Exam</div>' +
        '<div class="instr-alert">You only have <strong>2 attempts</strong> to pass this phase, so answer carefully. We wish you the best of luck.</div>' +
        '<div class="info-grid">' +
          '<div class="info-tile"><div class="info-tile-label">Time Limit</div><div class="info-tile-value">80 min</div></div>' +
          '<div class="info-tile"><div class="info-tile-label">Questions</div><div class="info-tile-value">19</div></div>' +
          '<div class="info-tile"><div class="info-tile-label">Format</div><div class="info-tile-value pink">Open book</div></div>' +
          '<div class="info-tile"><div class="info-tile-label">Cooldown</div><div class="info-tile-value pink">24 hours</div></div>' +
        '</div>' +
        '<div class="instr-section"><div class="instr-section-title">Exam Details</div>' +
          '<div class="rule-item"><div class="rule-dot"></div><span>You have <span class="rule-bold">80 minutes</span> to complete all questions.</span></div>' +
          '<div class="rule-item"><div class="rule-dot"></div><span>Use the blocks below the question counter to navigate freely — you can start with Q5 and jump to Q12 at any time.</span></div>' +
          '<div class="rule-item"><div class="rule-dot"></div><span>You can move between questions freely, but once you <span class="rule-bold">submit</span> an answer it cannot be changed.</span></div>' +
          '<div class="rule-item"><div class="rule-dot"></div><span>There is a <span class="rule-bold">1-day cooldown</span> between submissions.</span></div>' +
          '<div class="rule-item"><div class="rule-dot"></div><span>This is an <span class="rule-bold">open book</span> exam — you may use any documents at your disposal.</span></div>' +
          '<div class="rule-item"><div class="rule-dot"></div><span>Your progress is <span class="rule-bold">not saved</span>. Do not close or refresh the page.</span></div>' +
          '<div class="rule-item"><div class="rule-dot"></div><span>A <span class="rule-bold">Bloxlink</span> check will be performed — ensure you are verified beforehand. Verification may fail if Bloxlink is down or has reached its daily API limit.</span></div>' +
        '</div>' +
        '<div class="instr-section"><div class="instr-section-title">Exam Rules</div>' +
          '<div class="rule-item"><div class="rule-dot"></div><span>The usage of <span class="rule-bold">AI is prohibited</span>.</span></div>' +
          '<div class="rule-item"><div class="rule-dot"></div><span><span class="rule-bold">Plagiarism is not allowed.</span> Your answers must be in your own words. Copying from documents or other examinees will result in an immediate fail.</span></div>' +
          '<div class="rule-item"><div class="rule-dot"></div><span>You are not permitted to <span class="rule-bold">share, screenshot, or discuss</span> specific exam questions with anyone.</span></div>' +
        '</div>' +
        '<div style="font-size:11px;color:#556a74;text-align:center;margin-bottom:14px;">If you experience technical difficulties, consult a member of TMP High Command.</div>' +
        '<button class="action-btn" id="begin-btn" style="border-color:rgba(255,105,180,0.5);color:#ff69b4;margin-top:6px;">Begin Exam</button>' +
        '</div>';
      document.getElementById('begin-btn').addEventListener('click', startExam);
    }).catch(function() {
      q.innerHTML = '<div style="color:#ff3a3a;font-size:12px;">Connection error.</div>';
    });
  }

  function startGlobalTimer(serverSeconds) {
    if (timerInterval) _clearInterval(timerInterval);
    serverSecondsAtStart = serverSeconds;
    secondsLeft          = serverSeconds;
    timerStartEpoch      = _dateNow();
    lastProgressSent     = _dateNow();
    timerEl.style.display = 'block';

    function tick() {
      const elapsed   = Math.floor((_dateNow() - timerStartEpoch) / 1000);
      const remaining = serverSecondsAtStart - elapsed;
      if (remaining <= 0) {
        _clearInterval(timerInterval);
        secondsLeft   = 0;
        autoSubmitted = true;
        finalSubmit();
        return;
      }
      secondsLeft = remaining;
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      timerEl.innerText = '⏱ ' + m + ':' + (s < 10 ? '0' : '') + s;
      if (remaining <= 300) timerEl.classList.add('danger');
      if ((_dateNow() - lastProgressSent) >= 900000) {
        lastProgressSent = _dateNow();
        sendProgressUpdate();
      }
    }

    tick();
    timerInterval = _setInterval(tick, 1000);
  }

  function sendProgressUpdate() {
    post("PROGRESS_UPDATE", Object.assign(examIdentity(), {
      answeredCount: getAnsweredCount(),
      totalCount: mainQuestions.length,
      secondsLeft: secondsLeft,
      avgTime: calcAvgFromDurations()
    })).catch(function() {});
  }

  function startExam() {
    setAppWidth('narrow');
    document.getElementById('metaRow').style.display = 'flex';
    document.getElementById('segTracker').style.display = 'flex';
    const q = document.getElementById('question');
    q.classList.remove('scrollable');
    q.innerHTML = '<div style="color:#00dcff;font-size:12px;"><span class="loading-spinner"></span>Initializing Session...</div>';

    post("START_EXAM_LOG", examIdentity()).then(function(res) {
      return res.json();
    }).then(function(log) {
      return post("FETCH_QUESTIONS", { discordId: dUser && dUser.id }).then(function(res) {
        return res.json();
      }).then(function(qData) {
        mainQuestions     = qData.questions;
        answers           = new Array(mainQuestions.length).fill("");
        shadowAnswers     = new Array(mainQuestions.length).fill("");
        lockedQuestions   = new Array(mainQuestions.length).fill(false);
        questionDurations = new Array(mainQuestions.length).fill(0);
        examStarted       = true;
        buildSegTracker(mainQuestions.length);
        document.getElementById('input-area').style.display = 'flex';
        startMutationGuard();
        startGlobalTimer(log.secondsLeft);
        loadQuestion();
      });
    }).catch(function() {
      q.innerHTML = '<div style="color:#ff3a3a;font-size:12px;">Failed to initialize session.</div>';
    });
  }

  function loadQuestion() {
    questionStartTime = _dateNow();
    selectAllPending  = false;
    const q  = document.getElementById('question');
    const lk = lockedQuestions[current];
    q.classList.toggle('scrollable', mainQuestions[current].length > 250);
    q.style.textAlign = mainQuestions[current].length > 250 ? 'left' : 'center';
    progressEl.innerText = 'Question ' + (current + 1) + ' / ' + mainQuestions.length;
    updateSegTracker();
    answerEl.disabled  = lk;
    submitBtn.disabled = lk;
    nativeSet(lk ? (answers[current] || '') : (shadowAnswers[current] || ''));
    document.getElementById('locked-notice').style.display = lk ? 'block' : 'none';
    q.innerText = mainQuestions[current];
  }

  function buildSegTracker(total) {
    const tracker = document.getElementById('segTracker');
    tracker.innerHTML = '';
    for (var i = 0; i < total; i++) {
      (function(idx) {
        var b = document.createElement('div');
        b.className = 'seg-block clickable';
        b.id = 'seg-' + idx;
        b.addEventListener('click', function() {
          if (reviewMode) return;
          if (questionStartTime && !lockedQuestions[current]) {
            questionDurations[current] += Math.floor((_dateNow() - questionStartTime) / 1000);
          }
          current = idx;
          loadQuestion();
        });
        tracker.appendChild(b);
      })(i);
    }
  }

  function updateSegTracker() {
    for (var i = 0; i < mainQuestions.length; i++) {
      var b = document.getElementById('seg-' + i);
      if (!b) continue;
      b.className = 'seg-block clickable';
      if (lockedQuestions[i]) b.classList.add('locked');
      else if (answers[i] && answers[i].trim()) b.classList.add('filled');
      if (i === current) b.classList.add('current');
    }
  }

  function saveAndNext() {
    if (!examStarted || submitted || lockedQuestions[current]) return;
    const val = (shadowAnswers[current] || '').slice(0, MAX_ANSWER_LEN).trim();
    if (!val) return;
    if (questionStartTime) {
      questionDurations[current] += Math.floor((_dateNow() - questionStartTime) / 1000);
    }
    answers[current]         = val;
    lockedQuestions[current] = true;
    shadowAnswers[current]   = val;
    nativeSet('');
    if (current < mainQuestions.length - 1) { current++; loadQuestion(); }
    else { showReview(); }
  }

  function showReview() {
    setAppWidth('wide');
    reviewMode = true;
    document.getElementById('input-area').style.display = 'none';
    updateSegTracker();
    var html = '<div style="width:100%;"><div class="review-header">Review Submissions</div><div class="review-list">';
    for (var i = 0; i < mainQuestions.length; i++) {
      var hasAns = answers[i] && answers[i].trim();
      html += '<div class="review-row"><div class="review-qnum">Q' + (i + 1) + '</div>' +
              '<div class="review-ans ' + (hasAns ? '' : 'missing') + '">' +
              (hasAns ? answers[i].replace(/&/g,'&amp;').replace(/</g,'&lt;') : 'No answer') +
              '</div></div>';
    }
    html += '</div><div style="display:flex;gap:8px;">' +
      (secondsLeft > 0 ? '<button class="action-btn" id="back-btn" style="flex:1;">Back</button>' : '') +
      '<button class="action-btn" id="final-btn" style="border-color:#ff69b4;color:#ff69b4;flex:2;">Final Submission</button>' +
      '</div></div>';
    var q = document.getElementById('question');
    q.classList.add('scrollable');
    q.innerHTML = html;
    if (secondsLeft > 0) document.getElementById('back-btn').addEventListener('click', resumeExam);
    document.getElementById('final-btn').addEventListener('click', finalSubmit);
  }

  function resumeExam() {
    setAppWidth('narrow');
    reviewMode = false;
    document.getElementById('input-area').style.display = 'flex';
    loadQuestion();
  }

  function finalSubmit() {
    if (submitted) return;
    submitted = true;
    _clearInterval(timerInterval);
    var q = document.getElementById('question');
    q.innerHTML = '<div style="color:#00dcff;font-size:12px;"><span class="loading-spinner"></span>Submitting your exam...</div>';
    post("SUBMIT_EXAM", Object.assign(examIdentity(), {
      answers: answers.map(function(a) { return (a || '').slice(0, MAX_ANSWER_LEN); }),
      avgTime: calcAvgFromDurations(),
      autoSubmit: autoSubmitted
    })).then(function(res) {
      return res.json().then(function(result) {
        if (res.ok) {
          var methodMsg = '';
          if (result.method === 'embed') {
            methodMsg = 'Your responses were submitted via embed.';
          } else if (result.method === 'txt') {
            methodMsg = 'Discord rejected the embed — your responses were submitted as a TXT file instead.';
          } else {
            methodMsg = 'Your responses were submitted, but there may have been a delivery issue. Contact High Command if needed.';
          }
          q.innerHTML = '<div style="text-align:center;"><div style="font-family:\'Rajdhani\';font-size:18px;font-weight:700;color:#00dcff;margin-bottom:8px;">SUBMITTED</div><p style="font-size:12px;color:#8aa4b0;line-height:1.6;">' + methodMsg + '</p></div>';
          document.getElementById('input-area').style.display = 'none';
          document.getElementById('metaRow').style.display = 'none';
          document.getElementById('segTracker').style.display = 'none';
        } else {
          submitted = false;
          var errMsg = result.error || 'Unknown error';
          q.innerHTML = '<div style="text-align:center;"><div style="font-family:\'Rajdhani\';font-size:15px;font-weight:700;color:#ff3a3a;margin-bottom:8px;">SUBMISSION FAILED</div><p style="font-size:12px;color:#8aa4b0;">' + errMsg + '</p></div>';
        }
      });
    }).catch(function() {
      submitted = false;
      q.innerHTML = '<div style="text-align:center;"><div style="font-family:\'Rajdhani\';font-size:15px;font-weight:700;color:#ff3a3a;margin-bottom:8px;">SUBMISSION FAILED</div><p style="font-size:12px;color:#8aa4b0;">A network error occurred. Please try again.</p></div>';
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('login-btn').addEventListener('click', loginDiscord);
    submitBtn.addEventListener('click', saveAndNext);
    reviewBtn.addEventListener('click', function() { if (examStarted && !submitted) showReview(); });

    answerEl.addEventListener('keydown', handleAnswerKeydown);
    answerEl.addEventListener('input',   handleAnswerInput);
    answerEl.addEventListener('paste',   function(e) { e.preventDefault(); });
    answerEl.addEventListener('copy',    function(e) { e.preventDefault(); });
    answerEl.addEventListener('cut',     function(e) { e.preventDefault(); });
    answerEl.addEventListener('drop',    function(e) { e.preventDefault(); });

    var hash  = new URLSearchParams(window.location.hash.slice(1));
    var token = hash.get('access_token');
    if (token) {
      history.replaceState(null, document.title, window.location.pathname + window.location.search);
      _fetch('https://discord.com/api/users/@me', { headers: { Authorization: 'Bearer ' + token } })
        .then(function(r) { return r.json(); })
        .then(function(user) { dUser = user; showInstructions(); });
    }
  });

})();
</script>
</body>
</html>
